name: Auto Renew DigitalPlat DNS
on:
  schedule:
    - cron: '0 0 1 * *'  # 每月1号自动运行（UTC时间，对应北京时间每月1号8点）
  workflow_dispatch:      # 支持手动触发测试

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests -q

      - name: Run Renew Script
        env:
          DP_TOKEN: ${{ secrets.DPDNS_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          # 从环境变量获取 Token
          token = os.environ.get("DP_TOKEN")
          if not token:
              print("❌ 严重错误：未设置 DPDNS_TOKEN 密钥！")
              exit(1)

          # 配置请求头（Bearer 认证，和官方文档一致）
          headers = {"Authorization": f"Bearer {token}"}

          # 配置重试策略，解决网络波动/解析问题
          session = requests.Session()
          retry_strategy = Retry(
              total=3,                # 最多重试3次
              backoff_factor=1,       # 指数退避
              status_forcelist=[429, 500, 502, 503, 504]
          )
          adapter = HTTPAdapter(max_retries=retry_strategy)
          session.mount("https://", adapter)

          # 匹配官方文档的正确 API 地址
          API_BASE = "https://dash.domain.digitalplat.org/api/v1"

          print("🔍 正在获取你的域名列表...")
          try:
              # 1. 获取所有域名
              domains_resp = session.get(f"{API_BASE}/domains", headers=headers, timeout=15)
              domains_resp.raise_for_status()
              domains = domains_resp.json().get("domains", [])
              print(f"✅ 成功获取到 {len(domains)} 个域名")
          except Exception as e:
              print(f"❌ 获取域名失败: {e}")
              exit(1)

          # 2. 遍历续期每个域名
          success_count = 0
          for domain in domains:
              domain_id = domain["id"]
              domain_name = domain["name"]
              print(f"\n🔄 正在续期: {domain_name}")

              try:
                  # 续期接口：/domains/{id}/renew（和官方文档一致）
                  renew_resp = session.post(f"{API_BASE}/domains/{domain_id}/renew", headers=headers, timeout=15)
                  renew_resp.raise_for_status()
                  print(f"✅ 续期成功: {domain_name}")
                  success_count += 1
              except Exception as e:
                  print(f"❌ 续期失败: {domain_name} | 错误: {e}")

          print(f"\n🎉 任务完成！成功续期 {success_count}/{len(domains)} 个域名")
          EOF
