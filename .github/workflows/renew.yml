name: Auto Renew DigitalPlat DNS
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests -q

      - name: Run Renew Script
        env:
          DP_TOKEN: ${{ secrets.DPDNS_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          import requests

          token = os.environ.get("DP_TOKEN")
          print("🔍 正在验证 Token...")
          
          if not token:
              print("❌ 错误：未设置 DP_TOKEN 密钥！")
              exit(1)
          
          # 打印 Token 前10位（不泄露完整密钥，方便核对）
          print(f"✅ Token 已获取，前10位: {token[:10]}...")
          
          # 构造请求头（严格按官方格式）
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/json"
          }
          
          API_BASE = "https://dash.domain.digitalplat.org/api/v1"
          
          print("🔄 正在请求域名列表...")
          try:
              resp = requests.get(f"{API_BASE}/domains", headers=headers, timeout=15)
              print(f"📡 API 响应状态码: {resp.status_code}")
              
              if resp.status_code == 200:
                  domains = resp.json().get("domains", [])
                  print(f"✅ 成功获取 {len(domains)} 个域名")
                  for domain in domains:
                      print(f"  -> {domain['name']}")
              else:
                  print(f"❌ API 响应失败，状态码: {resp.status_code}")
                  print(f"❌ 响应内容: {resp.text}")
                  exit(1)
                  
          except Exception as e:
              print(f"❌ 请求异常: {e}")
              exit(1)
          EOF
