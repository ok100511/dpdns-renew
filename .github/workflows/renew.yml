name: Auto Renew DPDNS
on:
  schedule:
    - cron: '0 0 1 * *'  # 每月1号自动运行（UTC时间，对应北京时间每月1号8点）
  workflow_dispatch:      # 支持手动触发测试

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run renew script
        env:
          DPDNS_TOKEN: ${{ secrets.DPDNS_TOKEN }}
        run: |
          import os
          import requests

          token = os.environ['DPDNS_TOKEN']
          headers = {"Authorization": f"Bearer {token}"}

          # 获取所有域名列表
          domains_resp = requests.get("https://api.dpdns.org/v1/domains", headers=headers)
          if domains_resp.status_code != 200:
              print(f"❌ 获取域名失败！状态码：{domains_resp.status_code}")
              exit(1)
          
          domains = domains_resp.json().get("domains", [])
          print(f"✅ 找到 {len(domains)} 个域名，开始续期...")

          # 遍历所有域名执行续期
          for domain in domains:
              domain_id = domain["id"]
              domain_name = domain["name"]
              renew_url = f"https://api.dpdns.org/v1/domains/{domain_id}/renew"
              renew_resp = requests.post(renew_url, headers=headers)
              
              if renew_resp.status_code in [200, 201]:
                  print(f"✅ 续期成功：{domain_name}")
              else:
                  print(f"❌ 续期失败：{domain_name} | 状态码：{renew_resp.status_code} | 响应：{renew_resp.text}")
