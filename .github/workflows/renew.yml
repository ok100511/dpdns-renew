name: Auto Renew DPDNS
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests -q

      - name: Run Renew Script
        env:
          DPDNS_TOKEN: ${{ secrets.DPDNS_TOKEN }}
        run: |
          python - << 'EOF'
          import os
          import requests

          token = os.environ.get("DPDNS_TOKEN")
          if not token:
              print("❌ 未设置 DPDNS_TOKEN 密钥！")
              exit(1)

          headers = {"Authorization": f"Bearer {token}"}

          # 获取所有域名
          try:
              r = requests.get("https://api.dpdns.org/v1/domains", headers=headers, timeout=10)
              r.raise_for_status()
              domains = r.json().get("domains", [])
              print(f"✅ 找到 {len(domains)} 个域名")
          except Exception as e:
              print(f"❌ 获取域名失败: {e}")
              exit(1)

          # 续期每个域名
          success = 0
          for domain in domains:
              domain_id = domain["id"]
              domain_name = domain["name"]
              try:
                  renew_url = f"https://api.dpdns.org/v1/domains/{domain_id}/renew"
                  r = requests.post(renew_url, headers=headers, timeout=10)
                  r.raise_for_status()
                  print(f"✅ 续期成功: {domain_name}")
                  success += 1
              except Exception as e:
                  print(f"❌ 续期失败: {domain_name} | 错误: {e}")

          print(f"\n🎉 续期完成！成功: {success}/{len(domains)}")
          EOF
